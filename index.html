<!DOCTYPE html> 
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Coin Simulator</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body>
<div class="container">
<h1>Coin Simulator</h1>
<div class="card">
<h3>Administrador actual</h3>
  <div class="card">
<h3>Resumen</h3>
<p id="estadoGuardado"></p>
<p id="ingresosTotal"></p>
<p id="gastosTotal"></p>

</div>
  <button onclick="toggleTheme()">
Cambiar tema
</button>
<select id="selectorAdmin" onchange="cambiarAdmin()"></select>

<input type="text" id="nuevoAdmin" placeholder="Nuevo administrador">
  <input type="text" id="busqueda" placeholder="Buscar movimiento">

<button onclick="crearAdmin()">
Agregar administrador
</button>
  <button onclick="renombrarAdmin()">
Cambiar nombre
</button>
  <button onclick="eliminarAdmin()">
Eliminar administrador
</button>

</div>
<!-- FORM -->
<div class="card">
<select id="tipo">
<option value="ingreso">Ingreso</option>
<option value="gasto">Gasto</option>
<option value="deuda">Deuda</option>
</select>

<select id="categoria"></select>

<input type="number" id="monto" placeholder="Monto">
<input type="number" id="interes" placeholder="Interés %">
<input type="date" id="fecha">

<button onclick="agregar()">Agregar</button>
</div>

<!-- FILTRO -->
<div class="card">
<h3>Filtro por fecha</h3>
<input type="date" id="desde">
<input type="date" id="hasta">
<button onclick="render()">Aplicar filtro</button>
</div>

<!-- MOVIMIENTOS -->
<div class="card">
<h3>Movimientos</h3>
<div id="listaMovimientos"></div>
</div>

<!-- PRESUPUESTO -->
<div class="card">
<h3>Presupuesto por categoría</h3>
<select id="catPresupuesto"></select>
<input type="number" id="limite" placeholder="Límite">
<button onclick="setPresupuesto()">Guardar límite</button>
</div>

<!-- EXCEL -->
<div class="card">
<h3>Excel</h3>
<button onclick="exportarExcel()">Exportar</button>
<input type="file" id="inputExcel">
<button onclick="importarExcel()">Importar</button>
  <button onclick="exportarJSON()">
Exportar JSON
</button>
</div>
  

<!-- GRÁFICAS -->
<div class="card">
<h3>Gráfica temporal</h3>
<canvas id="lineChart"></canvas>
</div>

<div class="card">
<h3>Gráfica categorías</h3>
<canvas id="barChart"></canvas>
</div>

<div class="card">
<h3>Predicción</h3>
  <select id="unidadTiempo">
  <option value="dias">Días</option>
  <option value="semanas">Semanas</option>
  <option value="meses">Meses</option>
  <option value="semestres">Semestres</option>
  <option value="años">Años</option>
  <option value="decadas">Décadas</option>
</select>

<input type="number" id="cantidadTiempo" placeholder="Cantidad (ej: 3)">
<button onclick="render()">Calcular</button>
<p id="prediccion"></p>
</div>
<div class="card">
<h3>Total actual</h3>
<p id="totalActual"></p>
</div>
<p id="alerta" class="alert"></p>

</div>

<script>
let administradores = JSON.parse(localStorage.getItem('administradores')) || {
  "Personal": []
};

let adminActual = "Personal";
let presupuestos = JSON.parse(localStorage.getItem('presupuestos')) || {};
let lineChart, barChart;

  if('serviceWorker' in navigator){
 navigator.serviceWorker.register('sw.js')
}
/* 🔥 CATEGORÍAS DINÁMICAS */
const categoriasPorTipo = {
  ingreso: ["Empresa/Trabajo", "Cobro de deuda", "General"],
  gasto: ["Comida", "Transporte", "Ocio", "Servicio"],
  deuda: ["Pago de deuda", "General"]
};

  function crearAdmin(){
 let nombre = document.getElementById('nuevoAdmin').value.trim();

 if(!nombre){
   alert('Escribe un nombre');
   return;
 }

 if(administradores[nombre]){
   alert('Ya existe');
   return;
 }

 administradores[nombre] = [];

 actualizarAdmins();
 guardarAdmins();

 document.getElementById('nuevoAdmin').value = '';
}
  function cambiarAdmin(){
 adminActual = document.getElementById('selectorAdmin').value;
 render();
}
  function actualizarAdmins(){
 let selector = document.getElementById('selectorAdmin');

 selector.innerHTML = '';

 Object.keys(administradores).forEach(nombre => {
   let option = document.createElement('option');

   option.value = nombre;
   option.textContent = nombre;

   if(nombre === adminActual){
     option.selected = true;
   }

   selector.appendChild(option);
 });
}
  function guardarAdmins(){
 localStorage.setItem(
   'administradores',
   JSON.stringify(administradores)
 );
}
  function renombrarAdmin(){

 let nuevoNombre = prompt('Nuevo nombre');

 if(!nuevoNombre) return;

 if(administradores[nuevoNombre]){
   alert('Ese nombre ya existe');
   return;
 }

 administradores[nuevoNombre] =
   administradores[adminActual];

 delete administradores[adminActual];

 adminActual = nuevoNombre;

 guardar();
 actualizarAdmins();
 render();
}
  function eliminarAdmin(){

 if(Object.keys(administradores).length <= 1){
   alert('Debe existir al menos uno');
   return;
 }

 if(!confirm('¿Eliminar administrador?')) return;

 delete administradores[adminActual];

 adminActual = Object.keys(administradores)[0];

 guardar();
 actualizarAdmins();
 render();
}
function actualizarCategorias(){
  const tipo = document.getElementById('tipo').value;
  const select = document.getElementById('categoria');
  select.innerHTML = '';

  categoriasPorTipo[tipo].forEach(cat=>{
    let op = document.createElement('option');
    op.value = cat;
    op.textContent = cat;
    select.appendChild(op);
  });
}

function cargarCategoriasPresupuesto(){
  const select = document.getElementById('catPresupuesto');
  const todas = new Set();

  Object.values(categoriasPorTipo).forEach(lista=>{
    lista.forEach(cat=>todas.add(cat));
  });

  select.innerHTML = '';
  todas.forEach(cat=>{
    let op = document.createElement('option');
    op.value = cat;
    op.textContent = cat;
    select.appendChild(op);
  });
}

/* CORE */
function guardar(){
 localStorage.setItem(
   'administradores',
   JSON.stringify(administradores)
 );

 localStorage.setItem(
   'presupuestos',
   JSON.stringify(presupuestos)
 );
}

function eliminarMovimiento(i){
 movimientos.splice(i,1);
 guardar();
 render();
}

function agregar(){
 let tipo = document.getElementById('tipo').value;
 let categoria = document.getElementById('categoria').value;
 let monto = parseFloat(document.getElementById('monto').value);
 let interes = parseFloat(document.getElementById('interes').value) || 0;
 let fecha = document.getElementById('fecha').value;

 if(isNaN(monto) || monto <= 0) return alert('Monto inválido');
 if(!fecha) return alert('Selecciona fecha');

 administradores[adminActual].push({
 tipo,
 categoria,
 monto,
 interes,
 fecha
});

 document.getElementById('monto').value='';
 document.getElementById('interes').value='';
 document.getElementById('fecha').value='';
  
  document.getElementById('estadoGuardado')
.textContent = 'Guardado automático';

setTimeout(()=>{
 document.getElementById('estadoGuardado')
 .textContent = '';
},1500);

 guardar();
 render();
}

function setPresupuesto(){
 let cat = document.getElementById('catPresupuesto').value;
 let lim = parseFloat(document.getElementById('limite').value);

 if(!isNaN(lim)){
   presupuestos[cat]=lim;
   guardar();
   render();
 }
}

function render(){
 let movimientos = administradores[adminActual] || [];


 let porFecha={}, porCat={}, alertaTxt="";

   let desde = document.getElementById('desde').value;
 let hasta = document.getElementById('hasta').value;
  let ingresos = 0;
let gastos = 0;
   let filtrados = movimientos.filter(m=>{
   if(desde && m.fecha < desde) return false;
   if(hasta && m.fecha > hasta) return false;
   return true;
 });
  let filtro =
 document.getElementById('busqueda')?.value?.toLowerCase() || '';
 filtrados.forEach(m=>{
   let val = m.tipo==='deuda'
     ? m.monto*Math.pow(1+m.interes/100,3)
     : m.monto;

   let signed = m.tipo==='ingreso'?val:-val;

   porFecha[m.fecha]=(porFecha[m.fecha]||0)+signed;
   porCat[m.categoria]=(porCat[m.categoria]||0)+signed;

   if(presupuestos[m.categoria] && Math.abs(porCat[m.categoria])>presupuestos[m.categoria]){
     alertaTxt=`Excediste ${m.categoria}`;
      if(
 filtro &&
 !m.categoria.toLowerCase().includes(filtro)
        if(m.tipo === 'ingreso'){
 ingresos += val;
}else{
 gastos += val;
}
   }

){
 return;
}
   document.getElementById('ingresosTotal')
.textContent = 'Ingresos: $' + ingresos.toFixed(2);

document.getElementById('gastosTotal')
.textContent = 'Gastos: $' + gastos.toFixed(2);
 });

 document.getElementById('alerta').textContent=alertaTxt;

 /* LISTA */
 let cont = document.getElementById('listaMovimientos');
 cont.innerHTML='';

 filtrados.forEach(m=>{
   let i = movimientos.indexOf(m);

   let div = document.createElement('div');
   div.className='mov-item';

   div.innerHTML=`
     <div class="avatar">${m.tipo[0].toUpperCase()}</div>
     <div class="cuerpo">
       <strong>${m.tipo.toUpperCase()}</strong> - ${m.categoria}<br>
       $${m.monto} | ${m.fecha}<br>
       <button onclick="eliminarMovimiento(${i})">Eliminar</button>
     </div>
   `;

   cont.appendChild(div);
 });

 /* DATOS */
 let fechas = Object.keys(porFecha).sort((a,b)=>new Date(a)-new Date(b));
 let valores = fechas.map(f=>porFecha[f]);

 if(!fechas.length){
   if(lineChart) lineChart.destroy();
   if(barChart) barChart.destroy();
   return;
 }

 /* CHARTS */
 if(lineChart) lineChart.destroy();
 lineChart = new Chart(lineChartEl,{
   type:'line',
   data:{
     labels: fechas,
     datasets:[{
       data: valores,
       borderColor:'#00c853',
       segment:{
         borderColor: ctx => ctx.p1.parsed.y>=0 ? '#00c853' : '#ff5252'
       }
     }]
   }
 });

 if(barChart) barChart.destroy();
 barChart = new Chart(barChartEl,{
   type:'bar',
   data:{
     labels:Object.keys(porCat),
     datasets:[{
       data:Object.values(porCat),
       backgroundColor:Object.values(porCat).map(v=>v>=0?'#00c853':'#ff5252')
     }]
   }
 });

 prediccion(valores, fechas);
  document.getElementById('totalActual').textContent =
 '$' + calcularTotal().toFixed(2);
}

  function calcularTotal(){
 let movimientos = administradores[adminActual] || [];

 let total = 0;

 movimientos.forEach(m => {

   let val = m.tipo === 'deuda'
     ? m.monto * Math.pow(1 + m.interes / 100, 3)
     : m.monto;

   if(m.tipo === 'ingreso'){
     total += val;
   } else {
     total -= val;
   }
 });

 return total;
}
                     
function prediccion(vals, fechas){
 if(vals.length < 2) return;

 const unidad = document.getElementById('unidadTiempo').value;
 const cantidad = parseInt(document.getElementById('cantidadTiempo').value) || 1;

 // convertir fechas a tiempo real
 const fechaInicio = new Date(fechas[0]);
 const fechaFin = new Date(fechas[fechas.length - 1]);

 const diasTotales = (fechaFin - fechaInicio) / (1000 * 60 * 60 * 24);

 if(diasTotales === 0) return;

 // tendencia diaria real
 const tendenciaDiaria = (vals[vals.length - 1] - vals[0]) / diasTotales;

 // convertir unidad a días
 let factorDias = 1;

 switch(unidad){
   case 'dias': factorDias = 1; break;
   case 'semanas': factorDias = 7; break;
   case 'meses': factorDias = 30; break;
   case 'semestres': factorDias = 182; break;
   case 'años': factorDias = 365; break;
   case 'decadas': factorDias = 3650; break;
 }

 const diasFuturo = factorDias * cantidad;

 const futuro = vals[vals.length - 1] + (tendenciaDiaria * diasFuturo);

 document.getElementById('prediccion').textContent =
   `Proyección a ${cantidad} ${unidad}: $${futuro.toFixed(2)}`;
}

/* EXCEL */
function exportarExcel(){
 const ws = XLSX.utils.json_to_sheet(movimientos);
 const wb = XLSX.utils.book_new();
 XLSX.utils.book_append_sheet(wb, ws, "Movimientos");
 XLSX.writeFile(wb, "datos.xlsx");
}

function importarExcel(){
 const file = document.getElementById('inputExcel').files[0];
 const reader = new FileReader();

 reader.onload = e=>{
   const data = new Uint8Array(e.target.result);
   const wb = XLSX.read(data,{type:'array'});
   const ws = wb.Sheets[wb.SheetNames[0]];
   movimientos = XLSX.utils.sheet_to_json(ws);
   guardar();
   render();
 };

 reader.readAsArrayBuffer(file);
}
  function exportarJSON(){

 let data = JSON.stringify(
   administradores,
   null,
   2
 );

 let blob = new Blob(
   [data],
   {type:'application/json'}
 );

 let a = document.createElement('a');

 a.href = URL.createObjectURL(blob);

 a.download = 'coin-simulator.json';

 a.click();
}
function toggleTheme(){

 document.body.classList.toggle('light');

 localStorage.setItem(
   'theme',
   document.body.classList.contains('light')
 );
}

if(localStorage.getItem('theme') === 'true'){
 document.body.classList.add('light');
}
/* INIT */
document.getElementById('tipo').addEventListener('change', actualizarCategorias);

const lineChartEl = document.getElementById('lineChart');
const barChartEl = document.getElementById('barChart');

actualizarCategorias();
cargarCategoriasPresupuesto();
render();
</script>

</body>
</html>
